name: Collaborative Workflow

on:
  push:
    branches:
      - main

jobs:
  update_html_and_readme:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository so the runner can see your files
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Detect who pushed the code and update index.html accordingly
      - name: Update index.html
        run: |
          if [ "${{ github.actor }}" = "linaajhill" ]; then
            sed -i '/<\/body>/i <p>Updated by Team Leader on '"$(date)"'</p>' index.html
          elif [ "${{ github.actor }}" = "Member1Username" ]; then
            sed -i '/<\/body>/i <p>Updated by Member 1 on '"$(date)"'</p>' index.html
          elif [ "${{ github.actor }}" = "Member2Username" ]; then
            sed -i '/<\/body>/i <p>Updated by Member 2 on '"$(date)"'</p>' index.html
          fi

      # Step 3: Append a log entry to the bottom of the README.md file
      - name: Update README
        run: |
          echo "### Updated by ${{ github.actor }} on $(date '+%Y-%m-%d %H:%M:%S') [Commit: $(git rev-parse --short HEAD)]" >> README.md

      # Step 4: Save and push the modified files back to your repository automatically
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Workflow: Updated HTML and README for ${{ github.actor }}" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
